<script type="module">
// ── Firebase ──────────────────────────────────────────────
import { initializeApp }                           from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set, update, push, onValue, off, runTransaction }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FB = {
  apiKey:"AIzaSyB8-Qsl79BpvWXr7upkV3GiKPWIlaBiDhQ",
  authDomain:"ecodim-challenge.firebaseapp.com",
  databaseURL:"https://ecodim-challenge-default-rtdb.firebaseio.com",
  projectId:"ecodim-challenge",
  storageBucket:"ecodim-challenge.firebasestorage.app",
  messagingSenderId:"877902501456",
  appId:"1:877902501456:web:043fc066a3ee42b8bee355",
  measurementId:"G-YW1J208WXN"
};
const app = initializeApp(FB);
const db  = getDatabase(app);
const r   = p => ref(db, p);
const dbGet  = p => get(r(p)).then(s => s.exists() ? s.val() : null);
const dbSet  = (p,v) => set(r(p), v);
const dbUpd  = (p,v) => update(r(p), v);
const dbPush = (p,v) => push(r(p), v);
const dbOn   = (p,cb) => onValue(r(p), s => cb(s.exists() ? s.val() : null));
const dbOff  = p => off(r(p));
const dbTx   = (p,fn) => runTransaction(r(p), fn);

// ── Constants ─────────────────────────────────────────────
const LEVELS=[
  {name:"Débutant",min:0,icon:"📖",color:"#8090b8"},
  {name:"Disciple",min:50,icon:"✝️",color:"#2979ff"},
  {name:"Évangéliste",min:150,icon:"🕊️",color:"#d500f9"},
  {name:"Ancien",min:300,icon:"⭐",color:"#f0a500"},
  {name:"Maître Biblique",min:500,icon:"👑",color:"#ff1744"},
];
const getLevel=pts=>{for(let i=LEVELS.length-1;i>=0;i--)if(pts>=LEVELS[i].min)return LEVELS[i];return LEVELS[0]};
const MEDALS=["🥇","🥈","🥉"];
const rndQ=()=>3+Math.floor(Math.random()*4);

// ── State ─────────────────────────────────────────────────
let USER=null, MATCH=null, PENDING=null, HISTORY=[], CD_TIMER=null;

// ── Fallback questions ────────────────────────────────────
const FALLBACK=[
  {question:"Combien de prophètes de Baal Élie fit-il tuer au torrent de Kison ?",reference:"1 Rois 18:40",answers:["200","450","700","100"],correct:1,explanation:"Élie fit tuer les 450 prophètes de Baal.",topic:"Élie Carmel"},
  {question:"Quel était le nom du père de Josué ?",reference:"Exode 33:11",answers:["Nun","Caleb","Aaron","Éphraïm"],correct:0,explanation:"Josué est 'fils de Nun' dans toute la Bible.",topic:"Josué père"},
  {question:"Combien d'années Salomon régna-t-il ?",reference:"1 Rois 11:42",answers:["30","40","50","20"],correct:1,explanation:"Salomon régna quarante ans à Jérusalem.",topic:"Salomon règne"},
  {question:"Quel roi fit brûler le rouleau de Jérémie ?",reference:"Jérémie 36:23",answers:["Ézéchias","Josias","Jojakim","Sédécias"],correct:2,explanation:"Jojakim coupa et brûla le rouleau.",topic:"Jojakim rouleau"},
  {question:"À quel âge Josias devint-il roi ?",reference:"2 Rois 22:1",answers:["8 ans","12 ans","16 ans","20 ans"],correct:0,explanation:"Josias avait huit ans quand il devint roi.",topic:"Josias âge"},
  {question:"Combien de fois Paul fut-il fouetté de 39 coups ?",reference:"2 Cor 11:24",answers:["3 fois","5 fois","7 fois","2 fois"],correct:1,explanation:"Paul reçut cinq fois les 39 coups.",topic:"Paul souffrances"},
  {question:"Combien de jours Lazare était-il dans le tombeau ?",reference:"Jean 11:39",answers:["2","3","4","7"],correct:2,explanation:"Lazare était dans le tombeau depuis quatre jours.",topic:"Lazare tombeau"},
  {question:"Combien d'années Mathusalem vécut-il ?",reference:"Genèse 5:27",answers:["900","950","969","999"],correct:2,explanation:"Mathusalem vécut 969 ans.",topic:"Mathusalem âge"},
  {question:"Quel arbre Zachée monta-t-il pour voir Jésus ?",reference:"Luc 19:4",answers:["Figuier","Sycomore","Olivier","Cèdre"],correct:1,explanation:"Zachée monta dans un sycomore.",topic:"Zachée sycomore"},
  {question:"Quel métier exerçaient Aquilas et Priscille ?",reference:"Actes 18:3",answers:["Pêcheurs","Fabricants de tentes","Marchands","Tisserands"],correct:1,explanation:"Ils fabriquaient des tentes comme Paul.",topic:"Aquilas métier"},
  {question:"Combien de soldats gardaient Pierre en prison ?",reference:"Actes 12:4",answers:["4","8","16","32"],correct:2,explanation:"Quatre escouades de 4 soldats = 16 au total.",topic:"Pierre prison"},
  {question:"Dans quelle ville Lydie fut-elle baptisée ?",reference:"Actes 16:14",answers:["Corinthe","Thessalonique","Philippes","Éphèse"],correct:2,explanation:"Lydie fut baptisée à Philippes.",topic:"Lydie Philippes"},
  {question:"Combien de villes de refuge furent désignées ?",reference:"Nombres 35:6",answers:["3","6","9","12"],correct:1,explanation:"Six villes de refuge.",topic:"villes refuge"},
  {question:"Quel nom Dieu donna-t-il à Jacob ?",reference:"Genèse 32:28",answers:["Israël","Édom","Esaü","Moab"],correct:0,explanation:"Dieu changea le nom de Jacob en Israël.",topic:"Jacob Israël"},
  {question:"Combien de pains lors de la multiplication pour 4000 ?",reference:"Marc 8:5",answers:["5","7","10","12"],correct:1,explanation:"Les disciples avaient sept pains.",topic:"multiplication 4000"},
  {question:"Combien d'hommes choisit Dieu pour Gédéon ?",reference:"Juges 7:7",answers:["100","300","1000","3000"],correct:1,explanation:"Dieu choisit 300 hommes pour Gédéon.",topic:"Gédéon 300"},
];

async function genQ(round, used=[]) {
  const diffs=["difficile","très difficile","extrêmement difficile niveau expert"];
  const sys=`Tu es arbitre Ecodim Bible Challenge. Génère UNE question biblique de niveau ${diffs[Math.min(round-1,2)]}.
RÈGLES: détails précis, chiffres exacts, noms rares. JAMAIS basique. Évite: ${used.join(",")||"rien"}
JSON uniquement sans markdown: {"question":"...","reference":"...","answers":["A","B","C","D"],"correct":0,"explanation":"...","topic":"3 mots"}`;
  try {
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:700,system:sys,
        messages:[{role:"user",content:"Génère."}]})
    });
    const d=await res.json();
    const t=d.content?.map(b=>b.text||"").join("")||"";
    return JSON.parse(t.replace(/```json|```/g,"").trim());
  } catch {
    return FALLBACK[(round*5+used.length)%FALLBACK.length];
  }
}

// ── Image compress ────────────────────────────────────────
function compressPhoto(file,size=180){
  return new Promise(res=>{
    const rd=new FileReader();
    rd.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement("canvas");
        const rat=Math.min(size/img.width,size/img.height);
        c.width=img.width*rat; c.height=img.height*rat;
        c.getContext("2d").drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL("image/jpeg",.72));
      };
      img.src=e.target.result;
    };
    rd.readAsDataURL(file);
  });
}

// ── Helpers ───────────────────────────────────────────────

const h=html=>{const d=document.createElement("div");d.innerHTML=html;return d.firstChild};
function toast(msg,color="#e8ecf8"){

  t.textContent=msg; t.style.color=color; t.style.borderColor=color+"66";
  t.style.border="1px solid"; t.style.display="block";
  clearTimeout(t._t); t._t=setTimeout(()=>t.style.display="none",3200);
}
function av(photo,name,size,border,color){
  if(photo) return `<div class="av" style="width:${size}px;height:${size}px;border-color:${border}"><img src="${photo}"/></div>`;
  return `<div class="av" style="width:${size}px;height:${size}px;font-size:${size*.4}px;background:rgba(168,85,247,.15);border-color:${border};color:${color}">${(name||"?")[0].toUpperCase()}</div>`;
}

window.doLogin=async function(){
  const name=el("login-name")?.value.trim();
  const pin=el("login-pin")?.value.trim();
  if(!name||!pin){toast("Remplis tous les champs","#ff1744");return;}
  const data=await dbGet("users");
  if(!data){toast("Aucun joueur trouvé","#ff1744");return;}
  const entry=Object.entries(data).find(([,d])=>d.name.toLowerCase()===name.toLowerCase()&&d.pin===pin);

  const [uid,udata]=entry;

  await dbSet("users/"+uid+"/online",true);
  USER={uid,...udata};
  goMain();
  checkBonus();
};

function listenChallenges(){
  dbOn("challenges",data=>{

      if(c.to===USER.uid&&c.status==="pending"&&(!PENDING||PENDING.key!==key)){

    });
  });
}

  const opp={uid:PENDING.from,name:PENDING.fromName,photo:PENDING.fromPhoto||null,points:PENDING.fromPts};
  el("cnotif").style.display="none";
  startMatch(opp,PENDING.stake,PENDING.key);

  USER.photo=b64;
  renderMain();
  toast("Photo mise à jour ✅","#00e676");
};

window.doLogout=async function(){
  await dbSet("users/"+USER.uid+"/online",false);
  localStorage.removeItem("ecodim_uid");
  USER=null; MATCH=null; PENDING=null;
  dbOff("users"); dbOff("challenges");
  showAuth("register");
};

// ══════════════════════════════════════════════════════════
// MATCH
// ══════════════════════════════════════════════════════════
function startMatch(opp,stake,matchId){
  MATCH={
    id:matchId||"m_"+Date.now(), opponent:opp, stake,
    round:1, qIndex:0, qCounts:[rndQ(),rndQ(),rndQ()],
    myScore:0, oppScore:0, myRW:0, oppRW:0,
    roundMyQ:0, roundOppQ:0, roundSummary:[],
    usedTopics:[], currentQ:null, myAnswer:null, oppAnswer:null,
  };
  showCountdown();
}

function showCountdown(){
  const cd=el("cdown");
  cd.style.display="flex";
  el("cd-lbl").textContent=`Manche ${MATCH.round}/3 · ${MATCH.qCounts[MATCH.round-1]} questions`;
  el("cd-p1").textContent=USER.name.split(" ")[0];
  el("cd-p2").textContent=MATCH.opponent.name.split(" ")[0];
  let n=3;
  const tick=()=>{
    el("cd-num").textContent=n;
    el("cd-num").style.animation="none";
    void el("cd-num").offsetWidth;
    el("cd-num").style.animation="countPop .4s ease";
    if(n===0){ cd.style.display="none"; renderMatchQ(); return; }
    n--; CD_TIMER=setTimeout(tick,1000);
  };
  tick();
}

function renderMatchHdr(){
  const ms=MATCH;
  const qNum=ms.qIndex+1, qTotal=ms.qCounts[ms.round-1];
  const dots=(wins)=>[0,1,2].map(i=>`<div class="rdot ${i<wins?"on":""}"></div>`).join("");
  return `<div style="background:rgba(5,8,16,.98);backdrop-filter:blur(16px);border-bottom:1px solid #182038;padding:10px 14px;flex-shrink:0">
    <div class="msb">
      <div class="mside">
        <div class="mname" style="color:#2979ff">${USER.name.split(" ")[0]}</div>
        <div class="mpts" style="color:#2979ff">${ms.myScore}</div>
        <div class="rdots" style="color:#2979ff">${dots(ms.myRW)}</div>
      </div>
      <div class="vchip">M.${ms.round}/3<br/><span style="font-size:9px;color:#556080">Q${qNum}/${qTotal}</span></div>
      <div class="mside">
        <div class="mname" style="color:#00e676">${ms.opponent.name.split(" ")[0]}</div>
        <div class="mpts" style="color:#00e676">${ms.oppScore}</div>
        <div class="rdots" style="color:#00e676">${dots(ms.oppRW)}</div>
      </div>
    </div>
  </div>`;
}

async function renderMatchQ(){
  const ms=MATCH;
  const DIFFS=["Difficile","Très difficile","Niveau Expert"];
  el("app").innerHTML=`
    <div style="display:flex;flex-direction:column;min-height:100vh">
      ${renderMatchHdr()}
      <div style="flex:1;overflow-y:auto;padding:14px 14px 32px" id="q-area">
        <div class="ldr">
          <div class="lbook">📖</div>
          <div style="font-size:13px;color:#556080" class="pulse">L'IA prépare une question ${DIFFS[ms.round-1].toLowerCase()}...</div>
          <div class="lbar"><div class="lfill"></div></div>
        </div>
      </div>
    </div>`;

  ms.myAnswer=null; ms.oppAnswer=null;
  const q=await genQ(ms.round, ms.usedTopics);
  ms.currentQ=q;
  if(q.topic) ms.usedTopics.push(q.topic);

  // Push question to Firebase for online sync
  if(ms.id && ms.id!=="demo") await dbSet(`matches/${ms.id}/r${ms.round}_q${ms.qIndex}/question`,q);

  showQuestion();
  listenOppAnswer();
}

function showQuestion(){
  const ms=MATCH, q=ms.currentQ;
  const DIFFS=["Difficile","Très difficile","Niveau Expert"];
  const revealed=ms.myAnswer!==null&&ms.oppAnswer!==null;
  const myC=revealed&&ms.myAnswer===q.correct;
  const oppC=revealed&&ms.oppAnswer===q.correct;

  const ansHtml=q.answers.map((a,i)=>{
    let cls="abtn";
    if(revealed){
      if(i===q.correct) cls="abtn ok";
      else if(i===ms.myAnswer&&i!==q.correct) cls="abtn bad";
      else cls="abtn rv";
    }
    const markers=revealed?`<span style="font-size:12px;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:1px">
      ${i===ms.myAnswer?`<span>${myC&&i===q.correct?"✅":"❌"} Toi</span>`:""}
      ${i===ms.oppAnswer?`<span>${oppC&&i===q.correct?"✅":"❌"} ${ms.opponent.name.split(" ")[0]}</span>`:""}
    </span>`:"";
    return `<button class="${cls}" onclick="submitAns(${i})" ${ms.myAnswer!==null?"disabled":""}>
      <div class="altr">${["A","B","C","D"][i]}</div>
      <span style="flex:1">${a}</span>${markers}
    </button>`;
  }).join("");

  el("q-area").innerHTML=`<div class="fadein">
    <div class="qlbl">Manche ${ms.round}/3 · Q<strong>${ms.qIndex+1}/${ms.qCounts[ms.round-1]}</strong> · ${DIFFS[ms.round-1]}</div>
    <div style="display:flex;justify-content:space-between;align-items:center;background:#0b1020;border:1px solid #182038;border-radius:12px;padding:8px 14px;margin-bottom:12px;font-size:13px">
      <span style="color:#2979ff;font-weight:700">${USER.name.split(" ")[0]} : ${ms.roundMyQ}✓</span>
      <span style="color:#556080;font-size:11px">cette manche</span>
      <span style="color:#00e676;font-weight:700">${ms.roundOppQ}✓ : ${ms.opponent.name.split(" ")[0]}</span>
    </div>
    <div class="qbox">
      <div class="qdiff">🔥 ${DIFFS[ms.round-1]}</div>
      <div class="qref">${q.reference||""}</div>
      <div class="qtxt">${q.question}</div>
    </div>
    ${ms.myAnswer!==null&&!revealed?`<div class="wait"><span>✅ Réponse envoyée — attente de ${ms.opponent.name.split(" ")[0]}</span><div class="dots"><span></span><span></span><span></span></div></div>`:""}
    ${ansHtml}
    ${revealed?`<div class="expl"><strong style="color:#f0a500">📖 Bonne réponse :</strong> ${q.answers[q.correct]}<br/><br/>${q.explanation||""}</div>`:""}
  </div>`;
}

window.submitAns=async function(idx){
  const ms=MATCH;
  if(ms.myAnswer!==null) return;
  ms.myAnswer=idx;
  showQuestion();

  // Push to Firebase
  if(ms.id) await dbSet(`matches/${ms.id}/r${ms.round}_q${ms.qIndex}/${USER.uid}`,idx);

  // Simulate opponent if no real opponent synced
  if(!ms._oppListening){
    setTimeout(()=>{
      ms.oppAnswer=Math.random()<0.38?ms.currentQ.correct:Math.floor(Math.random()*4);
      showQuestion();
      setTimeout(()=>revealAndNext(),2200);
    },900+Math.random()*1800);
  }
};

function listenOppAnswer(){
  const ms=MATCH;
  if(!ms.id) return;
  ms._oppListening=true;
  const path=`matches/${ms.id}/r${ms.round}_q${ms.qIndex}/${ms.opponent.uid}`;
  dbOn(path,val=>{
    if(val!==null&&ms.oppAnswer===null){
      ms.oppAnswer=val;
      showQuestion();
      if(ms.myAnswer!==null) setTimeout(()=>revealAndNext(),2200);
    }
  });
}

function revealAndNext(){
  const ms=MATCH, q=ms.currentQ;
  const myC=ms.myAnswer===q.correct, oppC=ms.oppAnswer===q.correct;
  const qTotal=ms.qCounts[ms.round-1], isLast=ms.qIndex>=qTotal-1;

  ms.myScore+=(myC?1:0); ms.oppScore+=(oppC?1:0);
  ms.roundMyQ+=(myC?1:0); ms.roundOppQ+=(oppC?1:0);

  // Update header
  const hdr=document.querySelector(".msb")?.parentElement;
  if(hdr) hdr.outerHTML=renderMatchHdr();

  showQuestion(); // show revealed state

  setTimeout(()=>{
    if(isLast) finishRound();
    else{
      ms.qIndex++;
      ms.currentQ=null; ms.myAnswer=null; ms.oppAnswer=null;
      renderMatchQ();
    }
  },3600);
}

function finishRound(){
  const ms=MATCH;
  const myWon=ms.roundMyQ>ms.roundOppQ, oppWon=ms.roundOppQ>ms.roundMyQ;
  if(myWon) ms.myRW++;
  if(oppWon) ms.oppRW++;
  ms.roundSummary.push({round:ms.round,myQ:ms.roundMyQ,oppQ:ms.roundOppQ,
    total:ms.qCounts[ms.round-1],winner:myWon?"me":oppWon?"opp":"tie"});

  const s=ms.roundSummary[ms.roundSummary.length-1];
  const over=ms.round>=3||ms.myRW>=2||ms.oppRW>=2;

  el("app").innerHTML=`
    <div style="display:flex;flex-direction:column;min-height:100vh">
      ${renderMatchHdr()}
      <div style="display:flex;flex-direction:column;align-items:center;gap:16px;padding:24px;text-align:center;flex:1">
        <div style="font-family:'Barlow Condensed';font-size:12px;letter-spacing:3px;text-transform:uppercase;color:#556080">Résumé — Manche ${s.round}</div>
        <div style="font-size:15px;font-weight:700;color:${s.winner==="me"?"#00e676":s.winner==="opp"?"#ff1744":"#f0a500"}">
          ${s.winner==="me"?`✅ ${USER.name.split(" ")[0]} remporte la manche !`
            :s.winner==="opp"?`✅ ${ms.opponent.name.split(" ")[0]} remporte la manche !`
            :"🤝 Manche à égalité"}
        </div>
        <div class="card" style="width:100%">
          <div style="display:flex;justify-content:space-around;align-items:center">
            <div style="text-align:center">
              <div style="font-size:12px;color:#2979ff;margin-bottom:4px">${USER.name.split(" ")[0]}</div>
              <div style="font-family:'Cinzel Decorative';font-size:40px;color:#2979ff">${s.myQ}</div>
              <div style="font-size:11px;color:#556080">/ ${s.total}</div>
            </div>
            <div style="font-family:'Cinzel Decorative';font-size:18px;color:#f0a500">VS</div>
            <div style="text-align:center">
              <div style="font-size:12px;color:#00e676;margin-bottom:4px">${ms.opponent.name.split(" ")[0]}</div>
              <div style="font-family:'Cinzel Decorative';font-size:40px;color:#00e676">${s.oppQ}</div>
              <div style="font-size:11px;color:#556080">/ ${s.total}</div>
            </div>
          </div>
        </div>
        <div style="display:flex;gap:16px;align-items:center;font-family:'Barlow Condensed';font-size:16px;font-weight:700">
          <span style="color:#2979ff">${ms.myRW} manche${ms.myRW>1?"s":""}</span>
          <span style="color:#556080">—</span>
          <span style="color:#00e676">${ms.oppRW} manche${ms.oppRW>1?"s":""}</span>
        </div>
        <div style="font-size:13px;color:#556080" class="pulse">${over?"Fin du match...":"Manche "+(ms.round+1)+" dans quelques secondes..."}</div>
      </div>
    </div>`;

  setTimeout(()=>{
    if(over) showResult();
    else{
      ms.round++; ms.qIndex=0; ms.roundMyQ=0; ms.roundOppQ=0;
      ms.currentQ=null; ms.myAnswer=null; ms.oppAnswer=null;
      showCountdown();
    }
  },over?5000:4500);
}

async function showResult(){
  const ms=MATCH;
  const won=ms.myRW>ms.oppRW, tied=ms.myRW===ms.oppRW;

  if(!tied){
    const np=Math.max(0,USER.points+(won?ms.stake:-ms.stake));
    USER.points=np;
    await dbSet("users/"+USER.uid+"/points",np);
    await dbTx("users/"+USER.uid+"/"+(won?"wins":"losses"),v=>(v||0)+1);
    if(won) USER.wins=(USER.wins||0)+1; else USER.losses=(USER.losses||0)+1;
    if(ms.id) await dbUpd("challenges/"+ms.id,{status:"done"});
  }

  HISTORY.unshift({id:Date.now(),opponent:ms.opponent.name,
    result:tied?"tie":won?"win":"loss",stake:ms.stake,
    date:new Date().toLocaleDateString("fr-FR")});

  const rows=ms.roundSummary.map(s=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 4px;border-top:1px solid #182038">
      <span style="font-size:13px;color:#556080">Manche ${s.round}</span>
      <span style="font-weight:700;color:#2979ff">${s.myQ}/${s.total}</span>
      <span style="font-weight:700;color:#00e676">${s.oppQ}/${s.total}</span>
      <span style="font-size:16px">${s.winner==="me"?"🔵":s.winner==="opp"?"🟢":"🤝"}</span>
    </div>`).join("");

  el("app").innerHTML=`
    <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:14px;text-align:center">
      <div style="font-size:80px;animation:bounceIn .5s ease">${tied?"🤝":won?"🏆":"😔"}</div>
      <div style="font-family:'Cinzel Decorative';font-size:26px;color:${tied?"#f0a500":won?"#00e676":"#ff1744"}">
        ${tied?"Égalité !":won?USER.name.split(" ")[0]+" gagne !":ms.opponent.name.split(" ")[0]+" gagne !"}
      </div>
      <div style="font-size:14px;color:#556080">
        ${tied?"Aucun point échangé":won?`+${ms.stake} points remportés 🎉`:`-${ms.stake} points perdus`}
      </div>
      <div class="card" style="width:100%">
        <div style="display:flex;justify-content:space-between;font-size:12px;color:#556080;margin-bottom:8px;padding:0 4px">
          <span>Manche</span><span style="color:#2979ff">${USER.name.split(" ")[0]}</span>
          <span style="color:#00e676">${ms.opponent.name.split(" ")[0]}</span><span>Résultat</span>
        </div>
        ${rows}
        <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 4px;border-top:1px solid #182038">
          <span style="font-weight:700;font-size:13px">Total</span>
          <span style="font-family:'Cinzel Decorative';font-size:18px;color:#2979ff">${ms.myScore}</span>
          <span style="font-family:'Cinzel Decorative';font-size:18px;color:#00e676">${ms.oppScore}</span>
          <span style="font-size:16px">${won?"🏆":"😔"}</span>
        </div>
      </div>
      <button class="btn bgold" onclick="goMain()">🏠 Retour au Lobby</button>
    </div>`;

  toast(tied?"🤝 Égalité !":won?`🏆 +${ms.stake} pts !`:`😔 -${ms.stake} pts`,
    tied?"#f0a500":won?"#00e676":"#ff1744");
  MATCH=null;
}

window.goMain=goMain;
window.startMatch=startMatch;
</script>
